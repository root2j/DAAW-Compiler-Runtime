name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: pytest / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        shell: bash
        env:
          # Integration tests need real API keys; unit tests do not.
          # Skip the known-flaky timing-sensitive test.
          PYTHONPATH: src
        run: |
          pytest tests/ -q -m "not integration" \
            --deselect tests/test_executor.py::TestExecutorTimeout::test_task_timeout

      - name: Verify tool registry loads
        shell: bash
        env:
          PYTHONPATH: src
        run: |
          python scripts/verify_tools.py

  lint:
    name: syntax check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: compile all Python files
        run: |
          python -m compileall -q src/ tests/ scripts/
